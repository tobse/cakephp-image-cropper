name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php-version }} / CakePHP ${{ matrix.cakephp-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.1', '8.2', '8.3']
        cakephp-version: ['^5.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: gd, intl, mbstring
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php-version }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php-version }}-

      - name: Require specific CakePHP version
        run: composer require --dev --no-update "cakephp/cakephp:${{ matrix.cakephp-version }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run PHPUnit
        run: composer test

  coding-standard:
    name: Coding Standard & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, intl, mbstring
          coverage: none

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Run PHP CodeSniffer
        run: composer cs-check

      - name: Run PHPStan
        run: composer stan

  assets:
    name: Front-end assets build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Check if built assets are up to date
        run: |
          if ! git diff --quiet -- webroot; then
            echo "Warning: Built assets in webroot/ may be out of date. Run 'npm run build' and commit the result."
            git diff --stat -- webroot
          fi
